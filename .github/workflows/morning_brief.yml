name: Update Morning Briefing

on:
  schedule:
    - cron: '0 13 * * *'   # 8:00 AM EST (UTC-5) / 9:00 AM EDT (UTC-4)
    - cron: '0 1 * * *'    # 8:00 PM EST (UTC-5) / 9:00 PM EDT (UTC-4)
  workflow_dispatch:         # Manual trigger from Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        id: run_script
        env:
          NYT_KEY: ${{ secrets.NYT_KEY }}
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
        run: |
          python news_page.py
          echo "Script completed successfully at $(date -u)"

      - name: Verify output file was generated
        run: |
          if [ ! -f index.html ]; then
            echo "ERROR: index.html was not generated by the script!"
            exit 1
          fi
          echo "index.html verified ($(wc -c < index.html) bytes)"

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes to commit — index.html is unchanged."
          else
            git commit -m "Morning briefing updated $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
            echo "Successfully pushed updated index.html"
          fi
